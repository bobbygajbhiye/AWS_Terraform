name: Deploy Lambda Calculator Agent

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy.yml"
      - "lambda_src/**"
      - "terraform/**"
      - "scripts/build_lambda_package.sh"
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply Terraform after planning"
        required: true
        default: true
        type: boolean

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  TF_STATE_KEY: ${{ vars.TF_STATE_KEY || 'langgraph-calculator-agent/terraform.tfstate' }}
  TF_WORKING_DIR: terraform

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check deployment settings
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
        run: |
          test -n "$AWS_ROLE_TO_ASSUME" || (echo "Missing AWS_ROLE_TO_ASSUME secret" && exit 1)
          test -n "$TF_STATE_BUCKET" || (echo "Missing TF_STATE_BUCKET repository variable" && exit 1)

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: lambda_src/requirements-lambda.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Build Lambda package
        run: bash scripts/build_lambda_package.sh

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-langgraph-calculator

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.6"

      - name: Terraform fmt
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate -no-color

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -input=false -no-color -out=tfplan -var="aws_region=${{ env.AWS_REGION }}"

      - name: Terraform apply
        if: github.event_name == 'push' || inputs.apply == true
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -input=false -auto-approve tfplan

      - name: Terraform outputs
        if: github.event_name == 'push' || inputs.apply == true
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform output